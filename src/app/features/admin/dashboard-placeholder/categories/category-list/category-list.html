<div class="p-4" style="background-color: #f1f5f9; min-height: 100vh">
  <div class="d-flex justify-content-between mb-4">
    <h2 style="font-family: 'Space Grotesk'; color: #1a2e38">Categorías</h2>
    <button class="btn" style="background-color: #5289ad; color: #fff; border-radius: 8px">
      + Nueva Categoría
    </button>
  </div>

  <div class="card p-3" style="border-radius: 12px; border: 1px solid #acbcbf">
    <table class="table align-middle">
      <thead>
        <tr style="color: #698696">
          <th>Nombre</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let cat of categorias">
          <td>{{ cat.nombre }}</td>
          <td>
            <button class="btn btn-sm btn-outline-primary me-2">Editar</button>
            <button class="btn btn-sm" style="color: #ef4444">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
