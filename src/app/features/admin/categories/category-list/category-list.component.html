<div>
  <!-- Header -->
  <div class="d-flex justify-content-between align-items-start gap-3 mb-4 flex-wrap">
    <div>
      <h1 class="h2 fw-bold text-dark-blue cv-serif mb-1">Categorías de Eventos</h1>
      <p class="text-muted small mb-0">
        Gestioná las categorías temáticas disponibles para etiquetar eventos.
      </p>
    </div>
    <a
      routerLink="/admin/categorias/crear"
      class="btn btn-primary-accent text-decoration-none d-flex align-items-center gap-2 px-3 py-2 rounded-3 fw-semibold font-sm"
    >
      <i class="bi bi-plus-lg"></i> Nueva Categoría
    </a>
  </div>

  <!-- Spinner -->
  <div *ngIf="loading()" class="text-center py-5">
    <div class="spinner-border text-primary spinner-border-sm" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
    <p class="text-muted small mt-2 mb-0">Cargando categorías...</p>
  </div>

  <!-- Tabla -->
  <div *ngIf="!loading()" class="card border shadow-xs rounded-4 overflow-hidden bg-white">
    <!-- Empty state -->
    <div *ngIf="categorias().length === 0" class="text-center py-5">
      <i class="bi bi-tags text-muted opacity-50 display-5"></i>
      <p class="text-muted small mt-2 mb-0">No hay categorías creadas todavía.</p>
      <a routerLink="/admin/categorias/crear" class="btn btn-sm btn-primary mt-3 px-4 rounded-3"
        >Crear primera categoría</a
      >
    </div>

    <div *ngIf="categorias().length > 0">
      <!-- Cabecera -->
      <div
        class="row mx-0 py-2 px-4 bg-light-gray border-bottom font-xs fw-bold text-muted text-uppercase tracking-wider"
      >
        <div class="col-4 ps-0">Nombre</div>
        <div class="col-5">Descripción</div>
        <div class="col-3 text-end pe-0">Acciones</div>
      </div>

      <!-- Filas -->
      <div
        *ngFor="let cat of categorias()"
        class="row mx-0 py-3 px-4 border-bottom align-items-center table-row"
      >
        <!-- Nombre -->
        <div class="col-4 ps-0">
          <span class="fw-semibold text-dark-blue font-sm">{{ cat.nombre }}</span>
        </div>

        <!-- Descripción -->
        <div class="col-5 font-xs text-muted">
          {{ cat.descripcion || 'Sin descripción' }}
        </div>

        <!-- Acciones -->
        <div class="col-3 text-end pe-0 d-flex justify-content-end gap-2">
          <!-- Editar -->
          <a
            [routerLink]="['/admin/categorias/editar', cat.id]"
            class="btn btn-sm btn-outline-primary rounded-3 font-xs px-2 py-1"
            title="Editar"
          >
            <i class="bi bi-pencil"></i>
          </a>

          <!-- Eliminar -->
          <button
            class="btn btn-sm btn-outline-danger rounded-3 font-xs px-2 py-1"
            title="Eliminar"
            [disabled]="eliminandoId() === cat.id"
            (click)="confirmarEliminar(cat)"
          >
            <span
              *ngIf="eliminandoId() === cat.id"
              class="spinner-border spinner-border-sm"
              role="status"
            ></span>
            <i *ngIf="eliminandoId() !== cat.id" class="bi bi-trash"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
