<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Administración de Eventos</h2>

    <a routerLink="/admin/eventos/crear" class="btn btn-primary"> Nuevo Evento </a>
  </div>

  <table class="table table-striped table-bordered">
    <thead>
      <tr>
        <th>Título</th>
        <th>Fecha</th>
        <th>Cupo</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let evento of eventos">
        <td>{{ evento.titulo }}</td>

        <td>{{ evento.fecha }}</td>

        <td>{{ evento.cupo_maximo }}</td>

        <td>{{ evento.estado }}</td>

        <td>
          <a class="btn btn-warning btn-sm" [routerLink]="['/admin/eventos/editar', evento.id]">
            Editar
          </a>
        </td>
      </tr>
    </tbody>
  </table>
</div>
